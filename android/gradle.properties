# Gradle JVM
#
# 8 GB heap çoğu geliştirme makinesi için gereksiz derecede yüksekti.
# 4 GB, Flutter + Firebase + Media3 derlemeleri için dengeli bir başlangıçtır.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Build performance
org.gradle.parallel=true
org.gradle.caching=true

# Android
android.useAndroidX=true

# Kotlin
kotlin.code.style=official