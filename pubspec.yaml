name: hexa
description: Hopeful vertical video and meaningful support social platform.
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Backend & Auth
  # Keep the FlutterFire family on the same current generation.
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3

  # Keep 6.x for now because Hexa's AuthService uses the pre-7 API.
  google_sign_in: 6.3.0

  # Media & Caching
  video_player: ^2.11.1
  just_audio: ^0.10.6
  preload_page_view: ^0.1.5
  flutter_cache_manager: ^3.3.1
  cached_network_image: ^3.3.1

  # Local preferences
  shared_preferences: 2.3.5

  # Monetization
  purchases_flutter: 8.1.0

  # UI & UI Effects
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
