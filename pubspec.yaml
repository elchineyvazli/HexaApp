name: hexa
description: Cyberpunk Minimalist Vertical Video & Instant Chat Social Media Platform.
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Backend & Auth
  firebase_core: ^2.27.0
  firebase_auth: ^4.16.0
  google_sign_in: 6.3.0
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.0

  # Media & Caching
  video_player: ^2.11.1
  preload_page_view: ^0.1.5
  flutter_cache_manager: ^3.3.1
  cached_network_image: ^3.3.1

  # Monetization
  purchases_flutter: 8.1.0

  # UI & UI Effects
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true